x-common:
  env_file: &id001
  - .env
  restart: on-failure
  logging: &id002
    driver: json-file
    options:
      max-size: 10m
      max-file: '3'
services:
  warehouse:
    env_file: *id001
    restart: on-failure
    logging: *id002
    image: timescale/timescaledb:latest-pg16
    profiles:
    - all
    - warehouse
    - stream
    - orchestrate
    - bi
    ports:
    - 5432:5432
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-facility}
      POSTGRES_USER: ${POSTGRES_USER:-facility}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-facility}
    volumes:
    - warehouse_data:/var/lib/postgresql/data
    - ./warehouse/init/01_init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U ${POSTGRES_USER:-facility} -d ${POSTGRES_DB:-facility}
      interval: 5s
      timeout: 3s
      retries: 10
  kafka:
    env_file: *id001
    restart: on-failure
    logging: *id002
    image: confluentinc/cp-kafka:7.6.1
    profiles:
    - all
    - stream
    - edge
    - orchestrate
    - bi
    ports:
    - 9092:9092
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      CLUSTER_ID: ${KRAFT_CLUSTER_ID}
    volumes:
    - kafka_data:/var/lib/kafka/data
    healthcheck:
      test:
      - CMD-SHELL
      - kafka-broker-api-versions --bootstrap-server localhost:9092 2>/dev/null |
        grep -q '9092'
      interval: 10s
      timeout: 5s
      retries: 12
  schema-registry:
    env_file: *id001
    restart: on-failure
    logging: *id002
    image: confluentinc/cp-schema-registry:7.6.1
    profiles:
    - all
    - stream
    - edge
    ports:
    - 8081:8081
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    depends_on:
      kafka:
        condition: service_healthy
  connect:
    env_file: *id001
    restart: on-failure
    logging: *id002
    profiles:
    - all
    - stream
    ports:
    - 8083:8083
    environment:
      CONNECT_BOOTSTRAP_SERVERS: kafka:9092
      CONNECT_GROUP_ID: connect-platform
      CONNECT_CONFIG_STORAGE_TOPIC: connect-configs
      CONNECT_OFFSET_STORAGE_TOPIC: connect-offsets
      CONNECT_STATUS_STORAGE_TOPIC: connect-status
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE: 'false'
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: 'false'
      CONNECT_REST_ADVERTISED_HOST_NAME: connect
      CONNECT_PLUGIN_PATH: /usr/share/java,/usr/share/confluent-hub-components
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: '1'
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: '1'
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: '1'
    volumes:
    - connect_data:/etc/kafka/connect.d
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_started
      warehouse:
        condition: service_healthy
    image: ghcr.io/myorg/myrepo/connect:v1.0.0
  kafka-ui:
    env_file: *id001
    restart: on-failure
    logging: *id002
    image: provectuslabs/kafka-ui:latest
    profiles:
    - all
    - stream
    ports:
    - 8090:8080
    environment:
      KAFKA_CLUSTERS_0_NAME: platform
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      DYNAMIC_CONFIG_ENABLED: 'true'
    depends_on:
      kafka:
        condition: service_healthy
  bms-simulator:
    env_file: *id001
    restart: on-failure
    logging: *id002
    profiles:
    - all
    - edge
    ports:
    - 5020:5020
    environment:
      MODBUS_HOST: 0.0.0.0
      MODBUS_PORT: '5020'
      REFRESH_INTERVAL: '5'
      SAMPLES_DIR: /samples
    volumes:
    - ./samples:/samples:ro
    healthcheck:
      test:
      - CMD-SHELL
      - python3 -c "import socket; s=socket.socket(); s.connect(('localhost',5020));
        s.close()"
      interval: 10s
      timeout: 5s
      retries: 6
    image: ghcr.io/myorg/myrepo/bms-simulator:v1.0.0
  ems-simulator:
    env_file: *id001
    restart: on-failure
    logging: *id002
    profiles:
    - all
    - edge
    ports:
    - 5021:5021
    environment:
      MODBUS_HOST: 0.0.0.0
      MODBUS_PORT: '5021'
      REFRESH_INTERVAL: '5'
      SAMPLES_DIR: /samples
    volumes:
    - ./samples:/samples:ro
    healthcheck:
      test:
      - CMD-SHELL
      - python3 -c "import socket; s=socket.socket(); s.connect(('localhost',5021));
        s.close()"
      interval: 10s
      timeout: 5s
      retries: 6
    image: ghcr.io/myorg/myrepo/ems-simulator:v1.0.0
  bms-gateway:
    env_file: *id001
    restart: on-failure
    logging: *id002
    profiles:
    - all
    - edge
    environment:
      MODBUS_HOST: bms-simulator
      MODBUS_PORT: '5020'
      KAFKA_BOOTSTRAP: kafka:9092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      SAMPLES_DIR: /samples
    volumes:
    - ./samples:/samples:ro
    depends_on:
      bms-simulator:
        condition: service_healthy
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_started
    image: ghcr.io/myorg/myrepo/bms-gateway:v1.0.0
  ems-gateway:
    env_file: *id001
    restart: on-failure
    logging: *id002
    profiles:
    - all
    - edge
    environment:
      MODBUS_HOST: ems-simulator
      MODBUS_PORT: '5021'
      KAFKA_BOOTSTRAP: kafka:9092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      SAMPLES_DIR: /samples
    volumes:
    - ./samples:/samples:ro
    depends_on:
      ems-simulator:
        condition: service_healthy
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_started
    image: ghcr.io/myorg/myrepo/ems-gateway:v1.0.0
  erp-db:
    env_file: *id001
    restart: on-failure
    logging: *id002
    image: postgres:16-alpine
    profiles:
    - all
    - stream
    - edge
    ports:
    - 5433:5432
    environment:
      POSTGRES_DB: erp
      POSTGRES_USER: erp
      POSTGRES_PASSWORD: erp
    command: "postgres\n  -c wal_level=logical\n  -c max_replication_slots=4\n  -c\
      \ max_wal_senders=4\n"
    volumes:
    - erp_data:/var/lib/postgresql/data
    - ./erp/source_db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U erp -d erp
      interval: 5s
      timeout: 3s
      retries: 10
  erp-api:
    env_file: *id001
    restart: on-failure
    logging: *id002
    profiles:
    - all
    - stream
    - edge
    ports:
    - 8000:8000
    environment:
      DATABASE_URL: postgresql://erp:erp@erp-db:5432/erp
    depends_on:
      erp-db:
        condition: service_healthy
    image: ghcr.io/myorg/myrepo/erp-api:v1.0.0
  flink-jobmanager:
    env_file: *id001
    restart: on-failure
    logging: *id002
    image: flink:1.18.1-scala_2.12-java11
    profiles:
    - all
    - stream
    ports:
    - 8084:8081
    command: jobmanager
    environment:
      FLINK_PROPERTIES: 'jobmanager.rpc.address: flink-jobmanager

        '
    volumes:
    - flink_usrlib:/opt/flink/usrlib
    depends_on:
      kafka:
        condition: service_healthy
      warehouse:
        condition: service_healthy
  flink-taskmanager:
    env_file: *id001
    restart: on-failure
    logging: *id002
    image: flink:1.18.1-scala_2.12-java11
    profiles:
    - all
    - stream
    command: taskmanager
    environment:
      FLINK_PROPERTIES: 'jobmanager.rpc.address: flink-jobmanager

        taskmanager.numberOfTaskSlots: 2

        parallelism.default: 2

        '
    volumes:
    - flink_usrlib:/opt/flink/usrlib
    depends_on:
    - flink-jobmanager
  flink-processor:
    env_file: *id001
    restart: on-failure
    logging: *id002
    profiles:
    - all
    - stream
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      PG_DSN: host=warehouse port=5432 dbname=${POSTGRES_DB:-facility} user=${POSTGRES_USER:-facility}
        password=${POSTGRES_PASSWORD:-facility}
      CONSUMER_GROUP: telemetry-consumer
      TOPIC_PATTERN_RE: (bms|ems)\..*
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_started
      warehouse:
        condition: service_healthy
    image: ghcr.io/myorg/myrepo/flink-processor:v1.0.0
  airflow-db:
    env_file: *id001
    restart: on-failure
    logging: *id002
    image: postgres:16-alpine
    profiles:
    - all
    - orchestrate
    environment:
      POSTGRES_DB: airflow
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
    volumes:
    - airflow_data:/var/lib/postgresql/data
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U airflow -d airflow
      interval: 5s
      timeout: 3s
      retries: 10
  airflow-init:
    env_file: *id001
    restart: on-failure
    logging: *id002
    image: apache/airflow:2.7.3
    profiles:
    - all
    - orchestrate
    command: airflow db migrate
    environment:
      AIRFLOW__CORE__FERNET_KEY: 0
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
    depends_on:
      airflow-db:
        condition: service_healthy
  airflow-webserver:
    env_file: *id001
    restart: on-failure
    logging: *id002
    image: apache/airflow:2.7.3
    profiles:
    - all
    - orchestrate
    ports:
    - 8082:8080
    command: webserver
    environment:
      AIRFLOW__CORE__FERNET_KEY: 0
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__WEBSERVER__WEB_SERVER_PORT: '8080'
    volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./warehouse/dbt:/opt/airflow/dbt:ro
    depends_on:
    - airflow-init
  airflow-scheduler:
    env_file: *id001
    restart: on-failure
    logging: *id002
    image: apache/airflow:2.7.3
    profiles:
    - all
    - orchestrate
    command: scheduler
    environment:
      AIRFLOW__CORE__FERNET_KEY: 0
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./warehouse/dbt:/opt/airflow/dbt:ro
    depends_on:
    - airflow-init
  metabase:
    image: metabase/metabase:latest
    env_file:
    - .env
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
    profiles:
    - all
    - bi
    ports:
    - 3000:3000
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: '5432'
      MB_DB_HOST: warehouse
      MB_DB_USER: ${POSTGRES_USER:-facility}
      MB_DB_PASS: ${POSTGRES_PASSWORD:-facility}
      MB_SITE_NAME: ${METABASE_SITE_NAME:-Facility Analytics}
      MB_LLM_METABOT_PROVIDER: google/gemma-4-26b-a4b
      MB_LLM_ANTHROPIC_API_BASE_URL: http://localhost:1234
      MB_LLM_ANTHROPIC_API_KEY: sk-lm-Sdlav6FP:XPaFFPKhi96GPp4pgwpN
      JAVA_OPTS: -Xmx2048m -Xms256m
    depends_on:
      warehouse:
        condition: service_healthy
  grafana:
    env_file: *id001
    restart: on-failure
    logging: *id002
    image: grafana/grafana:10.3.3
    profiles:
    - all
    - bi
    ports:
    - 3001:3000
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
    - grafana_data:/var/lib/grafana
    - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      warehouse:
        condition: service_healthy
volumes:
  warehouse_data: null
  kafka_data: null
  connect_data: null
  erp_data: null
  flink_usrlib: null
  airflow_data: null
  grafana_data: null
